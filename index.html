<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL ROULETTE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="grain-overlay"></div>

    <div class="keyboard-hint" id="keyboardHint">
        <div class="hint-title">⌨️ Keyboard Shortcuts</div>
        <div class="hint-items">
            <div class="hint-item"><kbd>Space</kbd> Spin</div>
            <div class="hint-item"><kbd>S</kbd> Skip</div>
            <div class="hint-item"><kbd>V</kbd> Visit</div>
            <div class="hint-item"><kbd>1-7</kbd> Categories</div>
            <div class="hint-item"><kbd>Esc</kbd> Close</div>
        </div>
    </div>

    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="logo">URL ROULETTE</h1>
                <div class="tagline">Discover the weird & wonderful web</div>
            </div>
            <a href="https://github.com/apus3404-oss/url-roulette" target="_blank" class="github-button">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                <span>Star on GitHub</span>
                <div class="github-stars">★ 0</div>
            </a>
        </div>
    </header>

    <main class="main-container">
        <div class="categories">
            <button class="category-pill active" data-category="all">ALL</button>
            <button class="category-pill" data-category="art">ART</button>
            <button class="category-pill" data-category="science">SCIENCE</button>
            <button class="category-pill" data-category="weird">WEIRD</button>
            <button class="category-pill" data-category="games">GAMES</button>
            <button class="category-pill" data-category="tools">TOOLS</button>
            <button class="category-pill" data-category="learn">LEARN</button>
        </div>

        <div class="spin-container">
            <div class="spin-decoration spin-decoration-1"></div>
            <div class="spin-decoration spin-decoration-2"></div>
            <div class="spin-decoration spin-decoration-3"></div>

            <button class="spin-button" id="spinButton">
                <span class="spin-text">SPIN</span>
                <div class="spin-ring"></div>
                <div class="spin-ring spin-ring-2"></div>
            </button>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-card">
                <div class="result-category" id="resultCategory"></div>
                <h2 class="result-title" id="resultTitle"></h2>
                <p class="result-description" id="resultDescription"></p>
                <div class="result-actions">
                    <button class="btn-skip" id="skipButton">
                        <span>SKIP</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M15 10L5 10M15 10L11 6M15 10L11 14" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
                        </svg>
                    </button>
                    <button class="btn-share" id="shareButton">
                        <span>SHARE</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <circle cx="15" cy="5" r="3" stroke="currentColor" stroke-width="2"/>
                            <circle cx="5" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
                            <circle cx="15" cy="15" r="3" stroke="currentColor" stroke-width="2"/>
                            <path d="M7.5 11.5L12.5 6.5M7.5 8.5L12.5 13.5" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                    <a class="btn-visit" id="visitButton" href="#" target="_blank">
                        <span>VISIT SITE</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M5 15L15 5M15 5H8M15 5V12" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="sitesDiscovered">0</div>
                <div class="stat-label">Sites Discovered</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="spinsCount">0</div>
                <div class="stat-label">Total Spins</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Curated collection of <span id="totalSites">212</span> interesting websites</p>
        <p class="footer-credit">Made with ❤️ and a lot of coffee</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
